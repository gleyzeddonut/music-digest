<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Digest — Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 11px;
      color: #e76f51;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    h1 {
      font-size: 26px;
      font-weight: 900;
      color: #111;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #888;
      font-size: 14px;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 14px;
      color: #111;
      outline: none;
      margin-bottom: 22px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #e76f51; }
    .hint {
      font-size: 12px;
      color: #999;
      margin-top: -18px;
      margin-bottom: 22px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      background: #e76f51;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #d45f40; }
    button:disabled { background: #ccc; cursor: default; }
    .error {
      color: #c0392b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Music Digest</div>
    <h1>Welcome</h1>
    <p class="subtitle">Quick setup — your daily music briefing will be ready in seconds.</p>

    <label for="name">Your name</label>
    <input type="text" id="name" placeholder="e.g. Dan" autocomplete="given-name">

    <label for="email">Your email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

    <label for="apiKey">Claude API key <span style="font-weight:400;color:#aaa;">(optional)</span></label>
    <input type="password" id="apiKey" placeholder="Leave blank to use the shared key">
    <p class="hint">Only needed if you want to use your own Anthropic account.</p>

    <button id="btn" onclick="submit()">Get started</button>
    <div class="error" id="err"></div>
  </div>

  <script>
    async function submit() {
      const email = document.getElementById('email').value.trim();
      const apiKey = document.getElementById('apiKey').value.trim();
      const btn = document.getElementById('btn');
      const err = document.getElementById('err');

      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        err.textContent = 'Please enter a valid email address.';
        err.style.display = 'block';
        return;
      }

      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Saving…';

      try {
        const name = document.getElementById('name').value.trim();
        const res = await fetch('/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ digestTo: email, claudeApiKey: apiKey, userName: name }),
        });
        if (!res.ok) {
          const j = await res.json();
          throw new Error(j.error || 'Setup failed');
        }
        window.location.href = '/';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Get started';
      }
    }

    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') submit();
    });
  </script>
</body>
</html>
