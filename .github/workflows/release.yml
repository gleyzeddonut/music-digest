name: Release

# Builds the macOS DMG — the asset users download from GitHub Releases — on a
# clean runner and uploads it to the matching release. Triggered by pushing a
# version tag (e.g. v1.4.1) or manually from the Actions tab.
#
# Why this exists: electron-builder's DMG step runs a vendored `dmgbuild`
# Python script. On a dev machine with only a very new Python (3.14) and no
# `python2`, that step fails. CI pins a compatible Python so the DMG always
# builds the same way.
#
# No secrets to configure: all app credentials live in Supabase edge functions,
# and GITHUB_TOKEN (used to publish the release) is provided automatically.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Pin a dmgbuild-compatible Python so the DMG packaging step is
      # deterministic regardless of the runner's default Python version.
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:ui

      # Retry the build: electron-builder's DMG step intermittently fails on
      # GitHub's macOS runners with `hdiutil detach ... exit code 1` (a flaky
      # volume-unmount race, not a real error). --publish always is idempotent —
      # it overwrites assets and reuses the existing draft release — so a retry
      # safely completes the run.
      - name: Build & publish DMG to GitHub Releases
        run: |
          for attempt in 1 2 3; do
            echo "::group::electron-builder (attempt $attempt/3)"
            if npx electron-builder --mac --publish always; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "Attempt $attempt failed (likely a transient hdiutil/DMG flake); retrying in 15s…"
            # Best-effort cleanup of a stale mount left by the failed attempt.
            hdiutil detach -force '/Volumes/Music Digest' 2>/dev/null || true
            sleep 15
          done
          echo "electron-builder failed after 3 attempts."
          exit 1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Populate the GitHub release body from the matching CHANGELOG.md section,
      # so the published release shows what changed. The release was created
      # (as a draft) by electron-builder in the step above.
      - name: Set release notes from CHANGELOG
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines (perl is portable on the macOS runner).
          NOTES=$(printf '%s\n' "$NOTES" | perl -0pe 's/\A\n+//; s/\n+\z/\n/')
          if [ -z "$NOTES" ]; then
            echo "No CHANGELOG section for $VERSION; leaving release notes as-is."
            exit 0
          fi
          printf '%s\n' "$NOTES" > release-notes.md
          echo "--- release notes for $GITHUB_REF_NAME ---"; cat release-notes.md
          gh release edit "$GITHUB_REF_NAME" --notes-file release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
