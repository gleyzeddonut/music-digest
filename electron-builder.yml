appId: com.musicdigest.app
productName: Music Digest
copyright: Copyright © 2026

directories:
  output: dist

mac:
  category: public.app-category.music
  icon: assets/icon.icns
  # Unsigned distribution — recipients right-click → Open on first launch
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  title: Music Digest
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 180
      type: file
    - x: 410
      y: 180
      type: link
      path: /Applications
    - x: 130
      y: 310
      type: file
      path: build/Open Music Digest.command
    - x: 410
      y: 310
      type: file
      path: build/README.rtf

# Bundle the .env so Electron can load shared credentials at runtime.
# This file is in .gitignore — you must have it locally to build.
extraResources:
  - from: ".env"
    to: ".env"

files:
  - "**/*"
  - "!docs/**"
  - "!test/**"
  - "!.env*"
  - "!.firecrawl/**"
  - "!visuals/**"
  - "!assets/icon.iconset/**"
  - "!*.md"
