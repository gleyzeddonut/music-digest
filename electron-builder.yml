appId: com.musicdigest.app
productName: Music Digest
copyright: Copyright © 2026

# Registers the musicdigest:// URL scheme (adds CFBundleURLTypes to the macOS
# Info.plist) so email confirmation links open the app instead of a web page.
protocols:
  - name: Music Digest
    schemes:
      - musicdigest

directories:
  output: dist

mac:
  category: public.app-category.music
  icon: assets/icon.icns
  # Unsigned distribution — recipients right-click → Open on first launch
  identity: null
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  title: Music Digest
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 180
      type: file
    - x: 410
      y: 180
      type: link
      path: /Applications
    - x: 130
      y: 310
      type: file
      path: build/Open Music Digest.command
    - x: 410
      y: 310
      type: file
      path: build/README.rtf

# NOTE: .env is intentionally NOT bundled. All credentials (email/SMTP, API
# keys) live server-side in Supabase edge functions; the app only carries the
# public Supabase publishable key. Email is sent via the `send-email` function.
files:
  - "**/*"
  - "!docs/**"
  - "!test/**"
  - "!.env*"
  - "!.firecrawl/**"
  - "!visuals/**"
  - "!assets/icon.iconset/**"
  - "!*.md"
