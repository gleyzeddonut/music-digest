appId: com.musicdigest.app
productName: Music Digest
copyright: Copyright © 2026

# Registers the musicdigest:// URL scheme (adds CFBundleURLTypes to the macOS
# Info.plist) so email confirmation links open the app instead of a web page.
protocols:
  - name: Music Digest
    schemes:
      - musicdigest

directories:
  output: dist

mac:
  category: public.app-category.music
  icon: assets/icon.icns
  # Signed + notarized distribution. electron-builder auto-discovers the
  # "Developer ID Application" cert in the keychain; hardened runtime +
  # entitlements are required for notarization. App opens on a normal
  # double-click — no Gatekeeper workaround needed.
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Notarize via App Store Connect API key. Reads APPLE_API_KEY,
  # APPLE_API_KEY_ID and APPLE_API_ISSUER from the environment (see .env.example).
  notarize:
    teamId: W7T5PX7TS9
  target:
    - target: dmg
      arch: [x64, arm64]

dmg:
  title: Music Digest
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 180
      type: file
    - x: 410
      y: 180
      type: link
      path: /Applications

# NOTE: .env is intentionally NOT bundled. All credentials (email/SMTP, API
# keys) live server-side in Supabase edge functions; the app only carries the
# public Supabase publishable key. Email is sent via the `send-email` function.
files:
  - "**/*"
  - "!docs/**"
  - "!test/**"
  - "!.env*"
  - "!.firecrawl/**"
  - "!visuals/**"
  - "!assets/icon.iconset/**"
  - "!*.md"
