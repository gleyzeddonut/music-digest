[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
# Deep-link callback so confirmation/reset emails open the desktop app.
# NOTE: the hosted project also needs this added under
# Auth → URL Configuration → Redirect URLs in the Supabase dashboard.
additional_redirect_urls = ["musicdigest://auth-callback"]

# "Sign in with Spotify" runs before any session exists, so it must be callable
# without a JWT. It provisions a pre-confirmed user and mints a session itself;
# the single-use Spotify auth code is the real gate. Deploy with verify_jwt=false.
[functions.spotify-login]
verify_jwt = false
